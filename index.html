const Bl = ({bullets,cls}) => bullets?.length ? <ul className={cls}>{bullets.map((b,i)=><li key={i}>{b}</li>)}</ul> : null;
const ExpList = ({exp}) => exp?.map((e,i)=>(
  <div key={i} className="ent">
    <div className="eh"><span className="etitle">{e.role}</span><span className="edate">{e.dates}</span></div>
    <div className="esub">{e.company}{e.location?` · ${e.location}`:""}</div>
    <Bl bullets={e.bullets} cls="ebl"/>
  </div>
)) || null;
const EduList = ({edu}) => edu?.map((e,i)=>(
  <div key={i} className="ent">
    <div className="eh"><span className="etitle">{e.degree}</span><span className="edate">{e.dates}</span></div>
    <div className="esub">{e.institution}</div>
  </div>
)) || null;
const SkillList = ({skills,cls}) => skills?.length ? <div className={cls}>{skills.map((s,i)=><span key={i} className="skill">{s}</span>)}</div> : null;
const PhotoCircle = ({photoUrl,name,size=60,border="2px solid #c9a84c",bg="#2a2a2a",color="#fff",fontSize}) => {
  const ini = name?.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()||"?";
  const fs = fontSize||Math.round(size*0.32);
  return <div className="pc" style={{width:size,height:size,border,background:photoUrl?"transparent":bg,fontSize:fs,color}}>{photoUrl?<img src={photoUrl} alt="profile"/>:ini}</div>;
};

function buildWordDoc(d) {
  const docx = window.docx;
  if (!docx) return null;
  const { Document, Packer, Paragraph, TextRun, AlignmentType, LevelFormat, BorderStyle } = docx;
  const GOLD="C9A84C",DARK="1A1A1A",GRAY="666666";
  const divider = new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:6,color:DARK,space:1}},spacing:{after:160},children:[]});
  const sectionHead = (text) => new Paragraph({spacing:{before:240,after:100},border:{bottom:{style:BorderStyle.SINGLE,size:4,color:GOLD,space:1}},children:[new TextRun({text:text.toUpperCase(),bold:true,size:20,color:DARK,characterSpacing:100,font:"Arial"})]});
  const contactItems=[d.email,d.phone,d.location,d.linkedin].filter(Boolean).join("   |   ");
  const children=[
    new Paragraph({alignment:AlignmentType.LEFT,spacing:{after:40},children:[new TextRun({text:d.name||"",bold:true,size:52,color:DARK,font:"Georgia"})]}),
    new Paragraph({spacing:{after:80},children:[new TextRun({text:d.title||"",size:26,color:GOLD,font:"Arial",italics:true})]}),
    new Paragraph({spacing:{after:60},children:[new TextRun({text:contactItems,size:20,color:GRAY,font:"Arial"})]}),
    divider,
  ];
  if(d.summary){children.push(sectionHead("Professional Summary"));children.push(new Paragraph({spacing:{after:120},children:[new TextRun({text:d.summary,size:22,color:DARK,font:"Arial"})]}));}
  if(d.experience?.length>0){children.push(sectionHead("Experience"));d.experience.forEach(e=>{children.push(new Paragraph({spacing:{before:100,after:20},children:[new TextRun({text:e.role||"",bold:true,size:24,color:DARK,font:"Arial"}),new TextRun({text:e.dates?`   ${e.dates}`:"",size:20,color:GRAY,font:"Arial"})]}));if(e.company)children.push(new Paragraph({spacing:{after:60},children:[new TextRun({text:`${e.company}${e.location?" · "+e.location:""}`,size:20,color:GOLD,font:"Arial",italics:true})]}));(e.bullets||[]).forEach(b=>children.push(new Paragraph({numbering:{reference:"bullets",level:0},spacing:{after:40},children:[new TextRun({text:b,size:21,color:DARK,font:"Arial"})]})));});}
  if(d.education?.length>0){children.push(sectionHead("Education"));d.education.forEach(e=>{children.push(new Paragraph({spacing:{before:80,after:20},children:[new TextRun({text:e.degree||"",bold:true,size:24,color:DARK,font:"Arial"}),new TextRun({text:e.dates?`   ${e.dates}`:"",size:20,color:GRAY,font:"Arial"})]}));if(e.institution)children.push(new Paragraph({spacing:{after:60},children:[new TextRun({text:e.institution,size:20,color:GRAY,font:"Arial",italics:true})]}));});}
  if(d.skills?.length>0){children.push(sectionHead("Skills"));children.push(new Paragraph({spacing:{after:120},children:[new TextRun({text:d.skills.join("   •   "),size:21,color:DARK,font:"Arial"})]}));}
  return new Document({numbering:{config:[{reference:"bullets",levels:[{level:0,format:LevelFormat.BULLET,text:"•",alignment:AlignmentType.LEFT,style:{paragraph:{indent:{left:540,hanging:260}}}}]}]},sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1080,right:1080,bottom:1080,left:1080}}},children}]});
}

  const [template, setTemplate] = useState("classic");
  const [loading, setLoading] = useState(false);
  const [dlPDF, setDlPDF] = useState(false);
  const [dlWord, setDlWord] = useState(false);
  const [resumeData, setResumeData] = useState(null);
  const [error, setError] = useState(null);
  const [photoUrl, setPhotoUrl] = useState(null);
  const resumeRef = useRef(null);
  const [form, setForm] = useState({name:"",email:"",phone:"",location:"",linkedin:"",jobTitle:"",experience:"",education:"",skills:"",extra:""});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const generate = async () => {
    if (!form.name || !form.jobTitle) { setError("Please fill in your name and desired job title."); return; }
    setError(null); setLoading(true); setResumeData(null);
    const prompt = `You are an expert resume writer. Based on the info below, generate a polished resume in JSON format.
Name: ${form.name} | Title: ${form.jobTitle} | Email: ${form.email||"N/A"} | Phone: ${form.phone||"N/A"} | Location: ${form.location||"N/A"} | LinkedIn: ${form.linkedin||"N/A"}
Experience: ${form.experience||"Entry level"} | Education: ${form.education||"Not specified"} | Skills: ${form.skills||"Infer from role"} | Extra: ${form.extra||"None"}
Return ONLY valid JSON (no markdown, no backticks):
{"name":"","title":"","email":"","phone":"","location":"","linkedin":"","summary":"2-3 sentence professional summary","experience":[{"role":"","company":"","location":"","dates":"","bullets":["achievement 1","achievement 2","achievement 3"]}],"education":[{"degree":"","institution":"","dates":""}],"skills":["skill1","skill2","skill3","skill4","skill5","skill6","skill7","skill8"]}
Make bullets action-oriented and quantified. Return ONLY the JSON object.`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]}),
      });
      const data = await res.json();
      const text = data.content?.map(c=>c.text||"").join("")||"";
      setResumeData(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch { setError("Something went wrong. Please check your API key and try again."); }
    finally { setLoading(false); }
  };

  const downloadPDF = () => {
    if (!resumeRef.current) return;
    setDlPDF(true);
    const win = window.open("","_blank");
    const styles = Array.from(document.querySelectorAll("style")).map(s=>s.innerHTML).join("\n");
    win.document.write(`<html><head><title>${resumeData?.name||"Resume"}</title><style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;600;700;800&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');*{box-sizing:border-box;margin:0;padding:0;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}@page{margin:0;}${styles}</style></head><body>${resumeRef.current.innerHTML}</body></html>`);
    win.document.close(); win.focus();
    setTimeout(()=>{win.print();setDlPDF(false);},900);
  };

  const downloadWord = async () => {
    if (!resumeData) return;
    setDlWord(true);
    try {
      const doc = buildWordDoc(resumeData);
      if (!doc) { alert("Word export not available. Please try PDF instead."); return; }
      const blob = await window.docx.Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `${(resumeData.name||"resume").replace(/\s+/g,"_")}.docx`;
      document.body.appendChild(a); a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
    } catch(e) { alert("Word download failed. Please try PDF instead."); }
    finally { setDlWord(false); }
  };

  const RC = TPL_MAP[template] || Classic;

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">
        <div className="header">
          <span className="header-badge">✦ 20 Templates</span>
          <h1>ResumeForge</h1>
          <p>Fill in your details and get a polished, professional resume in seconds</p>
        </div>
        <div className="container">
          <div className="form-panel">
            <div className="panel-title">Your Information</div>
            <div className="form-grid">
              <div className="form-group"><label>Full Name *</label><input placeholder="Jane Smith" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
              <div className="form-group"><label>Job Title *</label><input placeholder="Software Engineer" value={form.jobTitle} onChange={e=>set("jobTitle",e.target.value)}/></div>
            </div>
            <div className="form-grid">
              <div className="form-group"><label>Email</label><input placeholder="jane@email.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
              <div className="form-group"><label>Phone</label><input placeholder="+1 555 000 0000" value={form.phone} onChange={e=>set("phone",e.target.value)}/></div>
            </div>
            <div className="form-grid">
              <div className="form-group"><label>Location</label><input placeholder="New York, USA" value={form.location} onChange={e=>set("location",e.target.value)}/></div>
              <div className="form-group"><label>LinkedIn</label><input placeholder="linkedin.com/in/jane" value={form.linkedin} onChange={e=>set("linkedin",e.target.value)}/></div>
            </div>
            <div className="form-group"><label>Work Experience</label><textarea rows="4" placeholder="Describe your work history. E.g. 3 years as frontend developer at TechCorp, built dashboards, led a team of 4..." value={form.experience} onChange={e=>set("experience",e.target.value)}/></div>
            <div className="form-group"><label>Education</label><textarea rows="2" placeholder="BSc Computer Science, MIT, 2018-2022" value={form.education} onChange={e=>set("education",e.target.value)}/></div>
            <div className="form-group"><label>Skills</label><input placeholder="React, Node.js, Python, Figma, SQL..." value={form.skills} onChange={e=>set("skills",e.target.value)}/></div>
            <div className="form-group"><label>Anything else?</label><textarea rows="2" placeholder="Certifications, awards, languages, projects..." value={form.extra} onChange={e=>set("extra",e.target.value)}/></div>
            <div className="form-group">
              <label>Profile Photo <span style={{color:"#555",fontWeight:400,letterSpacing:0,textTransform:"none",fontSize:11}}>(optional)</span></label>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {photoUrl
                  ? <img src={photoUrl} alt="preview" style={{width:52,height:52,borderRadius:"50%",objectFit:"cover",border:"2px solid #c9a84c",flexShrink:0}}/>
                  : <div style={{width:52,height:52,borderRadius:"50%",background:"#1a1a1a",border:"1px solid #2a2a2a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20,color:"#444"}}>👤</div>
                }
                <label style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#0d0d0d",border:"1px dashed #3a3a3a",borderRadius:10,padding:"10px 14px",cursor:"pointer",color:"#888",fontSize:13}}>
                  <span>{photoUrl?"Change Photo":"Upload Photo"}</span>
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files?.[0];if(file){const reader=new FileReader();reader.onload=ev=>setPhotoUrl(ev.target.result);reader.readAsDataURL(file);}}}/>
                </label>
                {photoUrl&&<button onClick={()=>setPhotoUrl(null)} style={{background:"none",border:"1px solid #3a3a3a",color:"#888",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12}}>Remove</button>}
              </div>
              <p style={{fontSize:11,color:"#555",marginTop:6}}>Your photo will appear on the resume if uploaded. Leave blank to skip.</p>
            </div>
            <div className="tpl-label">Choose a Template — 20 Styles</div>
            <div className="tpl-grid">
              {TEMPLATES.map(t=>(
                <div key={t.id} className={`tpl-card ${template===t.id?"active":""}`} onClick={()=>setTemplate(t.id)}>
                  <div className="tpl-thumb" style={{background:t.bg,overflow:"hidden",position:"relative"}}>
                    <div style={{position:"absolute",top:4,left:5,right:5,height:3,background:t.accent,borderRadius:1,opacity:0.9}}/>
                    <div style={{position:"absolute",top:9,left:5,right:10,height:2,background:t.accent,borderRadius:1,opacity:0.4}}/>
                    <div style={{position:"absolute",top:13,left:5,right:7,height:2,background:t.accent,borderRadius:1,opacity:0.4}}/>
                    <div style={{position:"absolute",top:17,left:5,right:12,height:2,background:t.accent,borderRadius:1,opacity:0.3}}/>
                    <div style={{position:"absolute",top:21,left:5,right:8,height:2,background:t.accent,borderRadius:1,opacity:0.3}}/>
                  </div>
                  <div className="tpl-name">{t.label}</div>
                </div>
              ))}
            </div>
            {error&&<div className="error-msg">{error}</div>}
            <button className="generate-btn" onClick={generate} disabled={loading}>
              {loading?"✦ Generating...":"✦ Generate My Resume"}
            </button>
          </div>
          <div className="preview-panel">
            <div className="preview-header">
              <div className="panel-title" style={{marginBottom:0}}>Preview</div>
              <div className="dl-buttons">
                <button className="download-btn" onClick={downloadPDF} disabled={!resumeData||dlPDF}>{dlPDF?"⏳":"⬇"} {dlPDF?"Preparing...":"PDF"}</button>
                <button className="download-btn word" onClick={downloadWord} disabled={!resumeData||dlWord}>{dlWord?"⏳":"📝"} {dlWord?"Preparing...":"Word (.docx)"}</button>
              </div>
            </div>
            {loading?(
              <div className="loading"><div className="spinner"/><p>ResumeForge is building your resume...</p></div>
            ):resumeData?(
              <div ref={resumeRef} className="resume-wrap"><RC d={resumeData} photoUrl={photoUrl}/></div>
            ):(
              <div className="placeholder">
                <span className="placeholder-icon">📋</span>
                <p>Your resume will appear here.<br/><br/><span style={{fontSize:12,color:"#333"}}>Choose a template, fill in your details, and click Generate.</span></p>
              </div>
            )}
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:48,paddingTop:24,borderTop:"1px solid #1a1a1a"}}>
          <div style={{fontSize:12,color:"#666",letterSpacing:"0.04em"}}>Built by <span style={{fontFamily:"'Playfair Display',serif",background:"linear-gradient(135deg,#f0ece4 30%,#c9a84c 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontWeight:700,fontSize:13}}>Siyio Labs</span></div>
          <div style={{fontSize:11,color:"#555",marginTop:6,letterSpacing:"0.03em"}}>© {new Date().getFullYear()} Siyio Labs. All rights reserved.</div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
