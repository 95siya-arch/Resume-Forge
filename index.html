<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://trusted-scripts.com;">
    <link rel="stylesheet" href="styles.css">
    <title>Resume Forge</title>
    <script src="script.js" defer></script>
</head>
<body>
    <header role="banner">
        <h1 id="site-title" aria-label="Welcome to Resume Forge">Resume Forge</h1>
    </header>
    <main role="main">
        <form id="resume-form" aria-labelledby="form-title">
            <h2 id="form-title">Create Your Resume</h2>
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" aria-required="true">
                <span class="error-message" aria-live="polite"></span>
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>
    <footer role="contentinfo">
        <p>&copy; 2026 Resume Forge. All Rights Reserved.</p>
    </footer>
    <script>
        // Moved API_KEY to environment configuration
        const API_KEY = process.env.API_KEY;
        const form = document.getElementById('resume-form');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            // Validate inputs
            const name = document.getElementById('name').value;
            if (!name) {
                document.querySelector('.error-message').textContent = 'Please provide your name.';
                return;
            }
            // Save to local storage
            localStorage.setItem('resumeData', JSON.stringify({ name }));
            // Proceed with form submission logic...
        });

        // Lazy loading for images and optimizing font loading would be handled separately.
        // Ensure all styles are in external CSS file to maintain separation of concerns.
    </script>
</body>
</html>
